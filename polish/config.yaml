sensitivity: high            # low | medium | high | paranoid
min_score_threshold: 8.5     # sentences below this get rewritten unless the project voice adapter explicitly allows the rougher version
max_rewrite_passes: 3        # prevent infinite loops
burstiness_target: 8         # target standard deviation of sentence word counts
max_hedge_density: 1         # max hedging words allowed per paragraph
voice_profile: "Project-aware. For Personal-domain content, read .claude/rules/personal-voice.md if present and give it precedence over generic defaults. Preserve direct judgment, specificity, parenthetical asides, mild uncertainty, uneven rhythm, and low-key humor."
content_types:               # different rules per content type
  - blog
  - technical
  - social
  - email
active_content_type: blog    # default
log_feedback: true           # auto-log every correction
auto_consolidate: true       # run learning engine automatically
consolidation_trigger: 10    # number of feedback entries before consolidation
enable_change_summary: true  # show summary of what was changed in output
change_summary_threshold: 10 # minimum flags before summary is included
priority_threshold:          # minimum priority to flag at each sensitivity level
  low: 4
  medium: 2
  high: 1
  paranoid: 0

# ─── Preset Combinations ───────────────────────────────────────────
# Copy the values from a preset into the settings above to apply it.
# These are not auto-applied — they're a reference for common scenarios.
#
# Quick blog draft cleanup:
#   sensitivity: medium | active_content_type: blog
#   min_score_threshold: 8.0 | burstiness_target: 7
#
# Final polish before publishing (default):
#   sensitivity: high | active_content_type: blog
#   min_score_threshold: 8.5 | burstiness_target: 8
#
# Technical README / docs:
#   sensitivity: low | active_content_type: technical
#   min_score_threshold: 7.5 | burstiness_target: 5
#
# Tweet / social post drafts:
#   sensitivity: medium | active_content_type: social
#   min_score_threshold: 8.5 | burstiness_target: 8
#
# Cold outreach / marketing email:
#   sensitivity: medium | active_content_type: email
#   min_score_threshold: 8.0 | burstiness_target: 6
#
# AI detection stress test:
#   sensitivity: paranoid | active_content_type: blog
#   min_score_threshold: 9.5 | burstiness_target: 10
